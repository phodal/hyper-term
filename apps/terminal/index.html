<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://127.0.0.1:* ws://[::1]:*; img-src 'self' data:; font-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Hyper Term</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <main id="terminal" aria-label="Terminal"></main>
    <form id="terminal-search" role="search"
      aria-label="Search terminal history" hidden>
      <label for="terminal-search-input">Find</label>
      <input
        id="terminal-search-input"
        type="search"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Search scrollback"
      />
      <output id="terminal-search-results" for="terminal-search-input"
        aria-live="polite"></output>
      <button id="terminal-search-previous" type="button"
        aria-label="Previous match">↑</button>
      <button id="terminal-search-next" type="submit"
        aria-label="Next match">↓</button>
      <button id="terminal-search-close" type="button"
        aria-label="Close search">×</button>
    </form>
    <div id="connection-status" role="status" aria-live="polite">
      Connecting…
    </div>
  </body>
</html>
